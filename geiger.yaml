esphome:
  name: geiger
  friendly_name: "Geiger Counter"

esp32:
  board: wemos_d1_mini32
  framework:
    type: arduino

logger:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret API_KEY

ota:
  - platform: esphome
    password: !secret ota_pwd

external_components:
  - source: github://d1m0k/esphome-radsens@1.0.3
    components: [ radsens ]
    refresh: 600s

i2c:
  - id: bus_a
    frequency: 400kHz

radsens:
  sensitivity: 105

sensor:
  - platform: radsens
    dynamic_intensity:
      name: "Dynamic Intensity"
    static_intensity:
      name: "Static Intensity"
    counts_per_polling:
      name: "Counts Per Polling"
    radsens_max_cpp:
      name: "RadSens Max CPP"
    max_cpp_timestamp:
      name: "Max CPP Timestamp (s uptime)"
    firmware_version:
      name: "Firmware Version"
    counts_per_minute:
      name: "Counts Per Minute"
    radsens_max_cpm:
      name: "RadSens Max CPM"
    max_cpm_timestamp:
      name: "Max CPM Timestamp (s uptime)"
    total_cpp:
      name: "Total Counts Per Polling"
    uptime:
      name: "Uptime"
    accumulated_dose_ur:
      name: "Accumulated Dose (uR)"
    accumulated_dose_msv:
      name: "Accumulated Dose (mSv)"

number:
  - platform: radsens
    polling_interval:
      name: "Polling Interval"



switch:
  - platform: radsens
    control_led:
      name: "Impulse LED"
      restore_mode: RESTORE_DEFAULT_ON
    control_high_voltage:
      name: "High Voltage Enable"
      restore_mode: RESTORE_DEFAULT_ON 
    control_low_power:
      name: "Low Power Mode"
      restore_mode: RESTORE_DEFAULT_OFF

